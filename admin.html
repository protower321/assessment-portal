<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Residency Application Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Chester Township Residency Applications</h1>

<table id="appTable">

<tr>
<th>ID</th>
<th>Name</th>
<th>Status</th>
<th>Review</th>
<th>Decision</th>
</tr>

</table>

<div id="details" class="hidden">

<h2>Application Details</h2>

<p><b>Name:</b> <span id="d_name"></span></p>
<p><b>DOB:</b> <span id="d_dob"></span></p>
<p><b>Email:</b> <span id="d_email"></span></p>
<p><b>Phone:</b> <span id="d_phone"></span></p>
<p><b>Address:</b> <span id="d_address"></span></p>
<p><b>Residency Length:</b> <span id="d_length"></span></p>
<p><b>Reason for Residency:</b></p>
<p><b>Inventory Public:</b> <span id="d_inventory"></span></p>

<div id="d_reason" style="background:#1e3f7a;padding:10px;border-radius:6px;"></div>

</div>

</div>

<script src="database.js"></script>
<script src="admin.js"></script>

</body>
</html>

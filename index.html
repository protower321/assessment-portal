<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assessment Portal Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Login</h1>
  <input id="username" placeholder="Account Username">

<script src="auth.js"></script>
</body>
</html>

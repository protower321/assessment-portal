<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chester Township Residency Application</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<h1>Chester Township Residency Application</h1>
<p class="subtitle">Apply for official residency recognition in Chester Township, Nova Scotia</p>

<form id="applicationForm">

<label>Full Legal Name</label>
<input type="text" required>

<label>Date of Birth</label>
<input type="date" required>

<label>Email Address</label>
<input type="email" required>

<label>Phone Number</label>
<input type="tel">

<label>Current Residential Address</label>
<input type="text" required>

<label>How long have you lived in Chester Township?</label>
<select required>
<option value="">Select</option>
<option>Less than 6 months</option>
<option>6 months - 1 year</option>
<option>1 - 3 years</option>
<option>3+ years</option>
</select>

<label>Reason for Residency Application</label>
<textarea rows="4" required></textarea>

<label>Upload Proof of Address</label>
<input type="file">

<button type="submit">Submit Application</button>

</form>

<div id="confirmation" class="hidden">
<h2>Application Submitted</h2>
<p>Your residency application for Chester Township has been received.</p>
<p>An administrator will review your application.</p>
</div>

</div>

<script src="exam.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chester Township Residency Application</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>Chester Township Residency Application</h1>
<p class="subtitle">Nova Scotia Municipal Residency Portal</p>

<form id="applicationForm">

<label>Full Legal Name</label>
<input type="text" id="name" required>

<label>Date of Birth</label>
<input type="date" id="dob" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Phone Number</label>
<input type="text" id="phone">

<label>Current Address</label>
<input type="text" id="address" required>

<label>Length of Residency</label>
<select id="length">
<option>Less than 6 Months</option>
<option>6 Months - 1 Year</option>
<option>1 - 3 Years</option>
<option>3+ Years</option>
</select>

<label>Reason for Application</label>
<textarea id="reason"></textarea>

<button type="submit">Submit Application</button>

</form>

<div id="confirmation" class="hidden">

<h2>Application Submitted</h2>
<p id="appID"></p>

<button onclick="downloadPDF()">Download Copy</button>

</div>

</div>

<script src="database.js"></script>
<script src="apply.js"></script>
<script src="pdf.js"></script>

</body>
</html>
